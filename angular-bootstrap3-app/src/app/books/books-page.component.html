<div class="container" style="max-width: 900px; margin-top: 30px;">
  <div class="page-header">
    <h1>Book Tracker <small>MEAN Stack CRUD</small></h1>
  </div>

  <div class="panel panel-default">
    <div class="panel-heading">
      <strong>{{ editingBookId ? 'Edit Book' : 'Add Book' }}</strong>
    </div>
    <div class="panel-body">
      <form (ngSubmit)="saveBook()" #bookForm="ngForm">
        <div class="row">
          <div class="col-sm-6 form-group">
            <label for="title">Title</label>
            <input
              id="title"
              name="title"
              class="form-control"
              [(ngModel)]="formData.title"
              required
            />
          </div>
          <div class="col-sm-6 form-group">
            <label for="author">Author</label>
            <input
              id="author"
              name="author"
              class="form-control"
              [(ngModel)]="formData.author"
              required
            />
          </div>
        </div>

        <div class="row">
          <div class="col-sm-6 form-group">
            <label for="genre">Genre</label>
            <input
              id="genre"
              name="genre"
              class="form-control"
              [(ngModel)]="formData.genre"
            />
          </div>
          <div class="col-sm-6 form-group">
            <label for="publishedYear">Published Year</label>
            <input
              id="publishedYear"
              name="publishedYear"
              type="number"
              class="form-control"
              [(ngModel)]="formData.publishedYear"
            />
          </div>
        </div>

        <button
          type="submit"
          class="btn btn-primary"
          [disabled]="bookForm.invalid || isSaving"
        >
          {{ editingBookId ? 'Update Book' : 'Create Book' }}
        </button>
        <button
          type="button"
          class="btn btn-default"
          (click)="cancelEdit()"
          *ngIf="editingBookId"
        >
          Cancel
        </button>
      </form>
    </div>
  </div>

  <div class="alert alert-danger" *ngIf="errorMessage">
    {{ errorMessage }}
  </div>

  <div class="panel panel-info">
    <div class="panel-heading">
      <strong>Books</strong>
    </div>
    <div class="table-responsive">
      <table class="table table-striped table-hover" *ngIf="books.length; else emptyState">
        <thead>
          <tr>
            <th>Title</th>
            <th>Author</th>
            <th>Genre</th>
            <th>Year</th>
            <th class="text-right">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let book of books">
            <td>{{ book.title }}</td>
            <td>{{ book.author }}</td>
            <td>{{ book.genre || 'N/A' }}</td>
            <td>{{ book.publishedYear || 'N/A' }}</td>
            <td class="text-right">
              <button class="btn btn-xs btn-warning" (click)="startEdit(book)">Edit</button>
              <button class="btn btn-xs btn-danger" (click)="deleteBook(book)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
      <ng-template #emptyState>
        <div class="well" style="margin: 15px;">No books found yet. Add your first entry above.</div>
      </ng-template>
    </div>
  </div>
</div>
